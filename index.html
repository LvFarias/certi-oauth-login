<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				margin: 0;
				padding: 0;
				font-family: Roboto;
				box-sizing: border-box;
			}
			body {
				display: flex;
				width: 100dvw;
				height: 100dvh;
				align-items: center;
				background-size: cover;
				justify-content: center;
				background-position: center;
				background-repeat: no-repeat;
				background-image: url('assets/backgroud.png');
			}
			.login-card {
				gap: 1rem;
				width: 360px;
				padding: 2rem;
				display: flex;
    			max-width: 90dvw;
				align-items: center;
				border-radius: 1rem;
				background: #ecfefd;
				flex-direction: column;
				animation: fadeIn 1s ease;
				box-shadow: 0 0.5rem 1.5rem rgba(14, 1, 20, 0.5);
			}
			.login-card h1 {
				color: #0e0114;
				margin-bottom: 1rem;
			}
			.login-card input {
				width: 100%;
				outline: none;
				padding: 0.5rem;
				font-size: 1rem;
				color: #0e0114;
				border-style: solid;
				background: transparent;
				border-color: #0abab5;
				border-width: 0px 0px 2px 0;
			}
			.login-card button {
				width: 100%;
				border: none;
				padding: 0.5rem;
				cursor: pointer;
				font-size: 0.9rem;
				border-radius: 0.5rem;
				transition: background 0.3s;
			}
			.btn-login {
				color: #ecfefd;
				background: #0abab5;
			}
			.btn-login:hover {
				background: #09ABA6;
			}
			.forgot {
				cursor: pointer;
				color: #0e0114;
				font-size: 0.75rem;
				align-self: flex-end;
				text-decoration: underline;
			}
			.btn-cloud {
				color: #ecfefd;
				background: #8a05be;
			}
			.btn-cloud:hover {
				background: #7F04AF;
			}
			.btn-cloud.btn-prod {
				color: #0e0114;
				background: #cfa904;
			}
			.btn-cloud.btn-prod:hover {
				background: #BE9C04;
			}
			@keyframes fadeIn {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}
		</style>
		<script>
			const VARS = {
				hml: {
					baseUrl: 'https://certieduc.remoteidcertisign-homolog.com.br',
					useTasy2: true,
					clientId: 'fdaee120-7963-4615-9086-8cae9fd1cc82',
					clientSecret: 'SOs0Au1pwEf41co5WO2tL9MEU85Se3uM',
					codeChallenge: 'A6xnQhbz4Vx2HuGl4lXwZ5U2I8iziLRFnhP5eNfIRvQ',
					codeVerifier: '1234',
				},
				prod: {
					baseUrl: 'https://remoteidcertisign.com.br',
					useTasy2: false,
					clientId: '311e5a69-d0d2-4fab-9a00-6b1ded68d70d',
					clientSecret: 'wiS9M+WqvYyrSzzuncrrSvjjrO3l0x6G',
					codeChallenge: 'A6xnQhbz4Vx2HuGl4lXwZ5U2I8iziLRFnhP5eNfIRvQ',
					codeVerifier: '1234',
				}
			};
			for (const env in VARS) {
				const vars = VARS[env];
				if (vars.useTasy2) {
					vars.tokenUrl = `${vars.baseUrl}/api/emr-digital-signature/token`;
					vars.oauthUrl = `${vars.baseUrl}/api/emr-digital-signature/authorize`;
				} else {
					vars.tokenUrl = `${vars.baseUrl}/api/v0/oauth/token`;
					vars.oauthUrl = `${vars.baseUrl}/api/v0/oauth/authorize`;
				}
			}

			function openOauthLogin(env) {
				localStorage.setItem('envVars', JSON.stringify(VARS[env]));
				const url = `${VARS[env].oauthUrl}`;
				const params = new URLSearchParams({
					state: 'login_info',
					response_type: 'code',
					scope: 'signature_session',
					code_challenge_method: 'S256',
					client_id: VARS[env].clientId,
					code_challenge: VARS[env].codeChallenge,
					// redirect_uri: `http://localhost:3200/oauth-callback`,
					redirect_uri: `https://lvfarias.github.io/certi-oauth-login/oauth-callback`,
				});
				const cpf = (document.getElementById('cpf').value).replace(/\D/g, '');
				if (cpf) {
					params.append('login_hint', cpf);
				}

				window.open(`${url}?${params.toString()}`, '_self');
			}
		</script>
	</head>
	<body>
		<div class="login-card">
			<h1>Login Com Certisign</h1>
			<input type="text" id="cpf" placeholder="CPF" />
			<button onclick="openOauthLogin('hml')" class="btn-cloud">
				Login HML
			</button>
			<button onclick="openOauthLogin('prod')" class="btn-cloud btn-prod">
				Login PROD
			</button>
		</div>
	</body>
</html>
